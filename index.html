function showToast(msg,type='success'){
  let t=document.getElementById('toast');
  t.innerHTML=msg;
  t.className='';
  t.classList.add(type);
  t.style.display='block';
  setTimeout(()=>{t.style.display='none'},3000)
}
  
function toggleDarkMode(){document.body.classList.toggle('dark-mode')}

function loginStudent()
{
  let name=document.getElementById('name').value.trim();
  
  let password=document.getElementById('password').value.trim();
  
  let students=JSON.parse(localStorage.getItem('students'))||[];
  
  let student=students.find(s=>s.name===name&&s.password===password);

  document.getElementById('loginCard').style.display = 'none';

}

function getSuccessRate()
{

}

function isDuplicateName(name)
{
  let students=JSON.parse(localStorage.getItem('students'))||[];
  return students.some(s=>s.name===name)
}

// 🚀 الدالة أصبحت سريعة ومباشرة وبدون معالجة ملفات الصور الثقيلة
function addStudent() 
{
  let name = document.getElementById('studentName').value.trim();
  let grade = document.getElementById('studentGrade').value;
  let password = document.getElementById('studentPassword').value.trim();
  let subjectsText = document.getElementById('studentSubjects').value.trim();
  
  if(!name || !password){ showToast('❌ يرجى ملء الاسم وكلمة السر','error'); return; }
  
  let subjects = [];
  subjectsText.split('\n').forEach(line => {
    let parts = line.split(':');
    if(parts.length === 2){ subjects.push({ name: parts[0], grade: parts[1] }); }
  });
  
  let calc = calculateGradesAuto(subjects);
  
  let studentData = {
    id: Date.now(),
    name: name,
    age: document.getElementById('studentAge').value.trim(),
    address: document.getElementById('studentAddress').value.trim(),
    parentPhone: document.getElementById('parentPhone').value.trim(),
    notes: document.getElementById('studentNotes').value.trim(),
    grade: grade,
    level: calc.level, // ✅ تم إصلاح المتغير هنا
    password: password,
    subjects: subjects,
    total: calc.total,
    percentage: calc.percent,
    gradeStatus: calc.grade,
    resultStatus: calc.status,
    image: 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
    feesPaid: false,
    absent: 0,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  db.collection('students').add(studentData)
  .then(() => {
    showToast('✅ تم إضافة الطالب بنجاح!');
    showAdminPanel();
  })
  .catch((error) => {
    showToast('❌ خطأ: ' + error.message, 'error');
  });
}


function deleteStudent(id) {
  if(!confirm('حذف الطالب؟')) return;
  db.collection('students').where('id', '==', id).get()
  .then((querySnapshot) => {
    querySnapshot.forEach((doc) => {
      doc.ref.delete();
    });
    showToast('✅ تم الحذف من الطالب');
  });
}

function toggleFees(id) {
  db.collection('students').where('id', '==', id).get()
  .then((querySnapshot) => {
    querySnapshot.forEach((doc) => {
      let currentFees = doc.data().feesPaid;
      doc.ref.update({ feesPaid: !currentFees });
    });
  });
}

function editStudent(id) {
  let students = JSON.parse(localStorage.getItem('students')) || [];

  if (!student) return;

  // وضع البيانات في الحقول

function saveModalChanges() {
    // 1. الحصول على ID الطالب
    let id = Number(document.getElementById('mStudentId').value);
    
    // 2. استخراج المواد والدرجات من مربع النصوص
    let subjectsText = document.getElementById('mSubjects').value.trim();
    let newSubjects = [];
    
    subjectsText.split('\n').forEach(line => {
        let parts = line.split(':');
        if(parts.length === 2) {
            newSubjects.push({
                name: parts[0].trim(), 
                grade: Number(parts[1].trim())
            });
        }
    });

    // 3. المحرك الحسابي: يحسب المجموع، التقدير، النتيجة، والمستوى تلقائياً
    let calc = calculateGradesAuto(newSubjects);

    // 4. تجهيز بيانات التحديث
    let updatedData = {
        name: document.getElementById('mName').value,
        password: document.getElementById('mPassword').value,
        grade: document.getElementById('mGrade').value,
        address: document.getElementById('mAddress').value,
        parentPhone: document.getElementById('mPhone').value,
        absent: document.getElementById('mAbsent').value,
        notes: document.getElementById('mNotes').value,
        subjects: newSubjects,      
        total: calc.total,          
        percentage: calc.percent,   
        gradeStatus: calc.grade,    
        resultStatus: calc.status,  
        level: calc.level          
    };

    // 5. الحفظ في Firebase
    db.collection('students').where('id', '==', id).get()
    .then((querySnapshot) => {
        querySnapshot.forEach((doc) => {
            doc.ref.update(updatedData);
        });
        
        // إغلاق المودال
        document.getElementById('editModal').style.display = 'none';
        showToast('✅ تم حفظ التعديلات وإعادة الحساب بنجاح!');
        
        // تحديث اللوحة فوراً بدلاً من عمل Refresh للصفحة كاملة
        showAdminPanel(); 
    })
    .catch((error) => {
        console.error("خطأ في الحفظ: ", error);
        showToast('❌ حدث خطأ أثناء الحفظ', 'error');
    });
}

function loadSavedSchedule()
{
    let grade=document.getElementById('tableGrade');
    if(!grade) return;

    let schedules=JSON.parse(localStorage.getItem('schedules'))||{};
    let table=schedules[grade.value];
    if(!table) return;

    schoolDays.forEach(day=>{
        for(let i=1;i<=6;i++){
            let input=document.getElementById(`${day}${i}`);
            if(input){ input.value = table[day]?.[i-1] || ''; }
        }
    });
}

function saveSchedule()
{
  let grade=document.getElementById('tableGrade').value;
  let schedules=JSON.parse(localStorage.getItem('schedules'))||{};
  schedules[grade]={};
  schoolDays.forEach(day=>{schedules[grade][day]=[];

      schedules[grade][day].push(document.getElementById(`${day}${i}`).value)
    }

function showTopStudents()
{
  let box = document.getElementById("topStudentsBox");
  if(!box) return;
  if(box.style.display === "block"){ box.style.display = "none"; return; }

  let students = JSON.parse(localStorage.getItem("students")) || [];
  let grades = ['الصف الأول', 'الصف الثاني', 'الصف الثالث', 'الصف الرابع', 'الصف الخامس', 'الصف السادس'];
  
  // ترتيب شامل لجميع الطلاب
  let allStudents = [...students].sort((a,b) => {
    let totalA = (a.subjects || []).reduce((x,y) => x + Number(y.grade || 0), 0);
    let totalB = (b.subjects || []).reduce((x,y) => x + Number(y.grade || 0), 0);
    return totalB - totalA;
  });

  let html = `<div class="card"><div class="section-title">🏆 أوائل المدرسة</div><table><tr><th>الترتيب</th><th>الطالب</th><th>الصف</th><th>المجموع</th></tr>`;
  allStudents.slice(0, 10).forEach((s, index) => {
    let total = (s.subjects || []).reduce((x,y) => x + Number(y.grade || 0), 0);
    html += `<tr><td>${index + 1}</td><td>${s.name}</td><td>${s.grade}</td><td>${total}</td></tr>`;
  });
  html += `</table></div>`;

  // إضافة أوائل كل صف
  grades.forEach(grade => {
    let classStudents = students.filter(s => s.grade === grade).sort((a,b) => {
      let totalA = (a.subjects || []).reduce((x,y) => x + Number(y.grade || 0), 0);
      let totalB = (b.subjects || []).reduce((x,y) => x + Number(y.grade || 0), 0);
      return totalB - totalA;
    });
    
    if(classStudents.length > 0) {
      html += `<div class="card"><div class="section-title">🏅 أوائل ${grade}</div><table><tr><th>الترتيب</th><th>الطالب</th><th>المجموع</th></tr>`;
      classStudents.slice(0, 3).forEach((s, index) => {
        let total = (s.subjects || []).reduce((x,y) => x + Number(y.grade || 0), 0);
        html += `<tr><td>${index + 1}</td><td>${s.name}</td><td>${total}</td></tr>`;
      });
      html += `</table></div>`;
    }
  });

  box.innerHTML = html;
  box.style.display = "block";
}

// أضف 'level' إلى الدالة الحسابية
function calculateGradesAuto(subjects) {
    let total = 0;
    subjects.forEach(sub => total += Number(sub.grade || 0));
    let max = subjects.length * 100;
    let percent = max > 0 ? ((total / max) * 100).toFixed(1) : 0;
    let status = total >= (max * 0.5) ? 'ناجح ✅' : 'راسب ❌';
    let grade = percent >= 90 ? 'ممتاز 🌟' : (percent >= 80 ? 'جيد جداً 🎖️' : (percent >= 65 ? 'جيد 👍' : (percent >= 50 ? 'مقبول 😐' : 'ضعيف ⚠️')));
    
    // المستوى التلقائي
    let level = percent >= 85 ? 'متقدم' : (percent < 50 ? 'مبتدئ' : 'متوسط');
    
    return { total, percent, status, grade, level }; // لاحظ أننا أضفنا level هنا
}
